<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Task Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-primary: #6366f1;
            --accent-secondary: #06b6d4;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 30px;
            text-align: center;
            background: linear-gradient(to right, var(--accent-primary), var(--accent-secondary));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-group {
            position: relative;
            margin-bottom: 30px;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px 20px;
            background: rgba(15, 23, 42, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.3);
        }

        button.add-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--accent-primary);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        button.add-btn:hover {
            background: #4f46e5;
            transform: translateY(-50%) scale(1.05);
        }

        ul {
            list-style: none;
        }

        li {
            background: rgba(255, 255, 255, 0.03);
            margin-bottom: 12px;
            padding: 16px 20px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s ease, background 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        li:hover {
            transform: translateX(5px);
            background: rgba(255, 255, 255, 0.06);
        }

        .task-content {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-grow: 1;
        }

        .task-text {
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .task-text.completed {
            color: var(--text-muted);
            text-decoration: line-through;
            opacity: 0.6;
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        .btn-icon {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.2s ease;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
        }

        .btn-toggle { color: var(--success); }
        .btn-toggle:hover { background: rgba(16, 185, 129, 0.1); }

        .btn-delete { color: var(--danger); }
        .btn-delete:hover { background: rgba(239, 68, 68, 0.1); }

        /* Empty state */
        .empty-state {
            text-align: center;
            color: var(--text-muted);
            margin-top: 20px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Task Hub</h1>

        <form action="{{ url_for('add_todo') }}" method="POST">
            <div class="input-group">
                <input type="text" name="todo" placeholder="What needs to be done?" required autocomplete="off">
                <button type="submit" class="add-btn">Add</button>
            </div>
        </form>

        <ul>
            {% for item in todos %}
            <li>
                <div class="task-content">
                    <span class="task-text {{ 'completed' if item.done else '' }}">
                        {{ item.task }}
                    </span>
                </div>
                <div class="actions">
                    <a href="{{ url_for('toggle_todo', todo_id=item.id) }}" class="btn-icon btn-toggle" title="Toggle Status">
                        <i class="fa-solid {{ 'fa-circle-check' if item.done else 'fa-circle' }}"></i>
                    </a>
                    <a href="{{ url_for('delete_todo', todo_id=item.id) }}" class="btn-icon btn-delete" title="Delete Task">
                        <i class="fa-solid fa-trash-can"></i>
                    </a>
                </div>
            </li>
            {% else %}
            <div class="empty-state">No tasks yet. Stay productive!</div>
            {% endfor %}
        </ul>
    </div>
</body>
</html>
